name: TrackSolid Device Check

on:
  schedule:
    # Jalan setiap 30 menit. Sesuaikan kalau perlu (format cron, UTC time).
    - cron: '*/30 * * * *'
  workflow_dispatch: {}  # supaya bisa di-trigger manual dari tab Actions

permissions:
  contents: write

jobs:
  check-devices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests playwright

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run device check
        env:
          TSP_ACCOUNT: ${{ secrets.TSP_ACCOUNT }}
          TSP_PASSWORD: ${{ secrets.TSP_PASSWORD }}
          TSP_LABEL_1: ${{ secrets.TSP_LABEL_1 }}
          TSP_ACCOUNT_2: ${{ secrets.TSP_ACCOUNT_2 }}
          TSP_PASSWORD_2: ${{ secrets.TSP_PASSWORD_2 }}
          TSP_LABEL_2: ${{ secrets.TSP_LABEL_2 }}
          TSP_ACCOUNT_3: ${{ secrets.TSP_ACCOUNT_3 }}
          TSP_PASSWORD_3: ${{ secrets.TSP_PASSWORD_3 }}
          TSP_LABEL_3: ${{ secrets.TSP_LABEL_3 }}
          TSP_ACCOUNT_4: ${{ secrets.TSP_ACCOUNT_4 }}
          TSP_PASSWORD_4: ${{ secrets.TSP_PASSWORD_4 }}
          TSP_LABEL_4: ${{ secrets.TSP_LABEL_4 }}
          TSP_ACCOUNT_5: ${{ secrets.TSP_ACCOUNT_5 }}
          TSP_PASSWORD_5: ${{ secrets.TSP_PASSWORD_5 }}
          TSP_LABEL_5: ${{ secrets.TSP_LABEL_5 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python check_devices.py

      - name: Upload debug screenshot if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add devices.json
          if [ -f devices_previous.json ]; then git add devices_previous.json; fi
          git diff --staged --quiet || git commit -m "Update device status $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
