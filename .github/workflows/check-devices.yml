name: TrackSolid Device Check

on:
  schedule:
    # Jalan setiap 30 menit. Sesuaikan kalau perlu (format cron, UTC time).
    - cron: '*/30 * * * *'
  workflow_dispatch: {}  # supaya bisa di-trigger manual dari tab Actions

permissions:
  contents: write

jobs:
  check-devices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests playwright

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run device check
        env:
          TSP_ACCOUNT: ${{ secrets.TSP_ACCOUNT }}
          TSP_PASSWORD: ${{ secrets.TSP_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python check_devices.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add devices.json devices_previous.json
          git diff --staged --quiet || git commit -m "Update device status $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
